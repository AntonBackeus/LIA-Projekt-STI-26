services:
  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: timescaledb2
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: appdb
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  emqx:
    image: emqx/emqx-enterprise:latest
    container_name: emqx2
    ports:
      - "1883:1883"     # MQTT
      - "18083:18083"   # EMQX dashboard
    environment:
      EMQX_DASHBOARD__DEFAULT_USERNAME: admin
      EMQX_DASHBOARD__DEFAULT_PASSWORD: strongpassword
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_logs:/opt/emqx/log
    depends_on:
      - timescaledb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18083/status"]
      interval: 5s
      retries: 20

  paho:
    build: ./etl
    container_name: paho
    environment:
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: appdb
      DB_USER: admin
      DB_PASS: secret
      MQTT_HOST: emqx
      MQTT_PORT: 1883
    depends_on:
      emqx:
        condition: service_healthy

