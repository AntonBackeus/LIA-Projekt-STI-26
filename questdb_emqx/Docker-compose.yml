  questdb:
    image: questdb/questdb:latest
    ports:
      - "9000:9000"
      - "8812:8812"
      - "9009:9009"
    environment:
      QDB_PG_USER: admin
      QDB_PG_PASSWORD: quest
    volumes:
      - questdb_data:/var/lib/questdb
    
  questdb-init:
    image: postgres:16
    depends_on:
      - questdb
    environment:
      PGPASSWORD: quest
    volumes:
      - ./questdb/init.sql:/init.sql
    entrypoint: >
      bash -c "
      until pg_isready -h questdb -p 8812; do
        echo "Waiting..."
        sleep 2
      done
      
      psql -h questdb -p 8812 -U admin -d qdb -f /init.sql
      "

volumes:
  questdb_data:
  grafana_data: 