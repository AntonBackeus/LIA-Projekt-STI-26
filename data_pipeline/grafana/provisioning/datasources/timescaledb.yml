apiVersion: 1

datasources:
  - name: Local Postgres
    type: postgres
    access: proxy
    url: timescaledb:5432
    database: appdb
    user: admin
    secureJsonData:
      password: secret
    jsonData:
      sslmode: disable
      postgresVersion: 1400
      timescaledb: true
      schema: public
      maxOpenConns: 100
      maxIdleConns: 100
