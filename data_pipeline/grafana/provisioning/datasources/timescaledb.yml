apiVersion: 1

datasources:
  - name: ${PROVISIONING_NAME}
    type: ${PROVISIONING_TYPE}
    access: ${PROVISIONING_ACCESS}
    url: ${DB_HOST}:${DB_PORT}
    database: ${DB_NAME}
    user: ${DB_USER}
    secureJsonData:
      password: ${DB_PASS}
    jsonData:
      sslmode: ${PROVISIONING_SSL}
      postgresVersion: ${PROVISIONING_POSTGRES_VERSION}
      timescaledb: ${PROVISIONING_TIMESCALE_BOOL}
      schema: ${PROVISIONING_SCHEMA_NAME}
      maxOpenConns: ${PROVISIONING_CONNECTIONS}
      maxIdleConns: ${PROVISIONING_CONNECTIONS}
